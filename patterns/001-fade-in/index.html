<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>001 ふわっと出現 — CSS Scroll-Driven Animations</title>
    <style>
      :root {
        --bg: #0b0d12;
        --bg-soft: #141823;
        --line: #232838;
        --text: #e7ebf3;
        --muted: #97a0b5;
        --accent: #7c8cff;
        --accent2: #5ce1c4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background:
          radial-gradient(1000px 600px at 90% -10%, rgba(124, 140, 255, 0.16), transparent 60%),
          var(--bg);
        color: var(--text);
        font-family:
          "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, -apple-system, sans-serif;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }

      .back {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        text-decoration: none;
        color: var(--text);
        background: rgba(20, 24, 35, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 13px;
      }
      .back:hover {
        border-color: var(--accent);
      }
      .hero {
        min-height: 92vh;
        display: grid;
        place-content: center;
        justify-items: center;
        text-align: center;
        padding: 0 24px;
        gap: 40px;
      }
      .num {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.2em;
        font-size: 14px;
      }
      .scroll-hint {
        color: var(--muted);
        font-size: 22px;
        animation: bob 1.6s ease-in-out infinite;
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(8px); }
      }

      .container {
        max-width: 760px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 200px 0;
      }

      /* ===========================================================
         本体：スクロールで出現するカード
         animation を「タイムライン」で駆動するのがキモ。
         - animation-timeline: view()  → 要素自身がビューポートを
           横切る進捗（0〜100%）でアニメが進む
         - animation-range            → どの区間でアニメさせるか
         shorthand の `animation` は animation-timeline を auto に
         戻してしまうので、timeline / range は必ず後に書く。
         =========================================================== */
      .card {
        display: grid;
        place-content: center;
        min-height: 100px;
        width: 100px;
        margin-bottom: 30px;
        /* background: linear-gradient(180deg, var(--bg-soft), rgba(20, 24, 35, 0.35)); */
        border: 1px solid var(--line);
        border-radius: 18px;
        font: 700 28px/1 ui-monospace, "SF Mono", Menlo, monospace;
        color: var(--muted);

        animation: reveal linear both;
        animation-timeline: view();
        /* 要素が下から入り始め（entry 0%）〜 4割ほど見えた（cover 40%）で完了 */
        animation-range: entry 0% cover 40%;
      }
      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(60px) scale(0.96);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      /* 左右から流し込むバリエーション（range も変えてある） */
      .card.from-left {
        animation-name: reveal-left;
        animation-range: entry 10% cover 35%;
      }
      .card.from-right {
        animation-name: reveal-right;
        animation-range: entry 10% cover 35%;
      }
      @keyframes reveal-left {
        from { opacity: 0; transform: translateX(-80px) rotate(-3deg); }
        to { opacity: 1; transform: translateX(0) rotate(0); }
      }
      @keyframes reveal-right {
        from { opacity: 0; transform: translateX(80px) rotate(3deg); }
        to { opacity: 1; transform: translateX(0) rotate(0); }
      }

      /* 未対応ブラウザ向けフォールバック：そのまま表示 */
      @supports not (animation-timeline: view()) {
        .card {
          animation: none;
          opacity: 1;
          transform: none;
          filter: none;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="../../">← 一覧へ</a>

    <header class="hero">
      <div class="num">001</div>
      <div class="scroll-hint">↓</div>
    </header>

    <div class="container">
      <div class="card">01</div>
      <div class="card from-left">02</div>
      <div class="card from-right">03</div>
      <div class="card">04</div>
      <div class="card from-left">05</div>
      <div class="card from-right">06</div>
    </div>
  </body>
</html>
