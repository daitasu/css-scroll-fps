<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>002 固定プログレスバー — CSS Scroll-Driven Animations</title>
    <style>
      :root {
        --bg: #0b0d12;
        --bg-soft: #141823;
        --line: #232838;
        --text: #e7ebf3;
        --muted: #97a0b5;
        --accent: #7c8cff;
        --accent2: #5ce1c4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background:
          radial-gradient(1000px 600px at 10% -10%, rgba(92, 225, 196, 0.12), transparent 60%),
          var(--bg);
        color: var(--text);
        font-family:
          "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, -apple-system, sans-serif;
        line-height: 1.9;
        -webkit-font-smoothing: antialiased;
      }
      .back {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        text-decoration: none;
        color: var(--text);
        background: rgba(20, 24, 35, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 13px;
      }
      .back:hover {
        border-color: var(--accent);
      }

      /* ===========================================================
         ① 上部固定プログレスバー
         scroll() = 直近のスクロールコンテナ（ここでは root=ページ）
         の縦スクロール進捗 0〜100% をタイムラインにする。
         transform: scaleX を 0→1 に動かすだけで伸びるバーになる。
         scaleX はレイアウトを起こさず GPU 合成で動くので軽い。
         =========================================================== */
      .progress {
        position: fixed;
        inset: 0 0 auto 0; /* top:0; left:0; right:0 */
        height: 7px;
        z-index: 20;
        transform-origin: 0 50%;
        transform: scaleX(0);
        background: linear-gradient(90deg, var(--accent2), var(--accent), #c47cff);
        box-shadow: 0 0 14px rgba(124, 140, 255, 0.7);

        animation: grow-x linear both;
        animation-timeline: scroll(root); /* ルート（ページ全体）の縦スクロール */
      }
      @keyframes grow-x {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      /* ===========================================================
         ② おまけ：右下の円形インジケーター
         conic-gradient の角度を CSS 変数 --p（0→1）で動かす。
         @property で --p を <number> 登録するとアニメ補間できる。
         =========================================================== */
      @property --p {
        syntax: "<number>";
        inherits: false;
        initial-value: 0;
      }
      .ring {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 20;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-content: center;
        --p: 0;
        background:
          radial-gradient(closest-side, var(--bg) 70%, transparent 71%),
          conic-gradient(var(--accent) calc(var(--p) * 360deg), rgba(255, 255, 255, 0.08) 0);

        animation: fill-ring linear both;
        animation-timeline: scroll(root);
      }
      @keyframes fill-ring {
        from { --p: 0; }
        to { --p: 1; }
      }
      .ring span {
        font-size: 11px;
        color: var(--muted);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }

      .hero {
        min-height: 90vh;
        display: grid;
        place-content: center;
        justify-items: center;
        text-align: center;
        padding: 0 24px;
        gap: 36px;
      }
      .cue {
        margin: 0;
        color: var(--muted);
        font-size: 22px;
        animation: bob 1.6s ease-in-out infinite;
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(8px); }
      }
      .hero .num {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.2em;
        font-size: 14px;
      }
      /* スクロール量を生むためのニュートラルなセクション（説明文は置かない） */
      .filler {
        max-width: 680px;
        margin: 0 auto;
        padding: 0 24px 30vh;
      }
      .filler section {
        min-height: 80vh;
        display: grid;
        place-content: center;
        font: 700 64px/1 ui-monospace, "SF Mono", Menlo, monospace;
        color: rgba(151, 160, 181, 0.16);
      }

      /* 未対応フォールバック：バーは満タン固定にしとく（壊れない程度に） */
      @supports not (animation-timeline: scroll()) {
        .progress {
          animation: none;
          transform: scaleX(1);
          opacity: 0.35;
        }
        .ring {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="../../">← 一覧へ</a>

    <!-- ① 上部のプログレスバー -->
    <div class="progress" role="progressbar" aria-label="読み進み"></div>

    <!-- ② 右下の円形インジケーター -->
    <div class="ring"><span>%</span></div>

    <header class="hero">
      <div class="num">002</div>
      <p class="cue">↓</p>
    </header>

    <!-- スクロール量を生むためのダミーセクション -->
    <div class="filler">
      <section>01</section>
      <section>02</section>
      <section>03</section>
      <section>04</section>
      <section>05</section>
    </div>
  </body>
</html>
